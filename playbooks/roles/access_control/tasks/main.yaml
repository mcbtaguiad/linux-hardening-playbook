---
- name: Disable root login via SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
    backup: yes

- name: Disable password authentication
  ansible.builtin.lineinfile:
    path:  /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present

- name: Copy login banner
  ansible.builtin.copy:
    src: issue.net
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'

- name: Configure SSH to show banner
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Banner'
    line: 'Banner /etc/issue.net'
    state: present

- name: Restart SSH
  ansible.builtin.service:
    name: sshd
    state: restarted
  ignore_errors: yes

- name: Set maximum simultaneous logins
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "* hard maxlogins {{ max_logins }}"
    state: present
    create: yes

- name: Enforce password complexity (Debian)
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: 'pam_pwquality.so'
    line: "password requisite pam_pwquality.so retry=3 minlen={{ password_minlen }}"
  when: ansible_os_family == 'Debian'

- name: Enforce password complexity (RedHat)
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^minlen'
    line: "minlen = {{ password_minlen }}"
  when: ansible_os_family == 'RedHat'

- name: Enable firewall 
  ansible.builtin.apt:
    name: ufw
    state: present
  when: ansible_os_family == 'Debian'

- name: Ensure ufw is enabled
  ansible.builtin.ufw:
    state: enabled
  when: ansible_os_family == 'Debian'

- name: Allow SSH in ufw
  ansible.builtin.ufw:
    rule: allow
    name: OpenSSH
  when: ansible_os_family == 'Debian'

- name: Enable firewall on RHEL (firewalld)
  ansible.builtin.yum:
    name: firewalld
    state: present
  when: ansible_os_family == 'RedHat'

- name: Start and enable firewalld
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: yes
  when: ansible_os_family == 'RedHat'

- name: Allow SSH through firewalld
  ansible.posix.firewalld:
    service: ssh
    permanent: true
    state: enabled
    immediate: yes
  when: ansible_os_family == 'RedHat'
