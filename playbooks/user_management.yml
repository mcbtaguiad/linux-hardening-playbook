---
- name: user group playbook
  hosts: all
  become: true          # use sudo for all tasks
  become_method: sudo
  # ansible_become_pass: "YOUR_SUDO_PASSWORD"
  roles:
    - role: user_management
      vars:
        password_maxdays: 90
        password_warndays: 7
        users:
        - name: mark
          sudo: true
          key: "ssh-rsa  mtaguiad@tags-p51"
          groups:
            - admins
            - developers
        - name: christian
          sudo: false
          key: "ssh-rsa  mtaguiad@tags-p51"
          groups:
            - developers


